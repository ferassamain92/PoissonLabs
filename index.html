<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Poisson Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- =========================
     TOP RIBBON (NAV)
========================= -->
<div class="nav">

  <a class="brand" href="index.html">λ</a>

  <div class="dropdown">
	<button class="dropbtn" onclick="toggleDropdown(event)">
	  Poisson Labs
	</button>

    <div class="dropdown-content">
      <a href="about.html">About Us</a>
      <a href="#offer">Services</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

</div>


<!-- =========================
     MIDDLE RIBBON (HERO)
========================= -->
<section class="hero">

  <div class="hero-content">

    <div class="logo">λ</div>

    <div class="hero-text">
      <h1>An actuarial consultancy exclusively focused on P&C pricing</h1>
    </div>

  </div>

</section>


<!-- =========================
     BOTTOM RIBBON (CONTACT)
========================= -->
<section class="bottom">

  <div class="divider"></div>

  <p class="contact">contact@poissonlabs.io</p>

</section>



<script>
function toggleDropdown(event) {
  event.stopPropagation();

  const menu = document.querySelector(".dropdown-content");
  menu.classList.toggle("show");
}

// close when clicking outside
document.addEventListener("click", function () {
  const menu = document.querySelector(".dropdown-content");
  menu.classList.remove("show");
});
</script>


</body>
</html>
